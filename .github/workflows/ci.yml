name: CI

# Enforces the pre-push QA gate from docs/iskolar-version-control.md §7
# automatically, instead of relying on a human to run it. A red gate blocks
# the PR (docs/QA-CHECKLIST.md P0-01).
on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default: jobs only read the repo. No job here needs write.
permissions:
  contents: read

# A newer push to the same ref cancels the in-flight run -- saves minutes and
# avoids stale green/red on superseded commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Node pinned to match local dev (v22.x). Bump here and in the toolchain
  # together so CI and local never silently diverge.
  NODE_VERSION: "22"

jobs:
  # The four core gates that must pass before any merge, in the same order as
  # the manual pre-push checklist.
  gates:
    name: lint · typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        # Placeholder Supabase config so `next build` can prerender the static
        # pages deterministically. No real DB is reached at build time: the
        # live reads (landing highlights, trust stats) are best-effort and
        # fall back to empty, and every DB-backed page is force-dynamic. These
        # are NOT secrets -- they're syntactically-valid throwaways.
        env:
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"
          NEXT_PUBLIC_SITE_URL: "https://iskolarmatch.app"
        run: npm run build

  # Secret scan -- the version-control doc §5 explicitly calls for this as a
  # CI step rather than relying on memory. Uses the gitleaks binary directly
  # (license-free, no marketplace-action license gate).
  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the scan covers every commit on the PR/branch,
          # not just the tip.
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION="8.21.2"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan for secrets
        # `detect` scans the git history; --redact keeps any finding out of the
        # public log. Non-zero exit (a leak found) fails the job.
        run: gitleaks detect --source . --redact --verbose

  # Runs the RLS integration suite against a real local Postgres (Supabase),
  # so tests/integration/rls.test.ts stops self-skipping and actually exercises
  # every policy's allow/deny (docs/QA-CHECKLIST.md P0-03). Separate job because
  # it needs Docker + a booted stack, which the fast gates job shouldn't wait on.
  rls:
    name: RLS integration (local Supabase)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start local Supabase (applies migrations + seed)
        run: npx supabase start

      - name: Run RLS integration tests against the local stack
        run: |
          # Capture the stack's anon URL/key and hand them to the suite via the
          # env vars it gates on -- without them the suite self-skips.
          eval "$(npx supabase status -o env | sed 's/^/export /')"
          export TEST_SUPABASE_URL="$API_URL"
          export TEST_SUPABASE_ANON_KEY="$ANON_KEY"
          npx vitest run tests/integration/rls.test.ts

      - name: Stop local Supabase
        if: always()
        run: npx supabase stop --no-backup

  # End-to-end smoke over the DB-independent public pages. Playwright provisions
  # its own browser; the webServer config builds + starts the app. Kept as its
  # own job so a browser flake never blocks the core gates.
  e2e:
    name: e2e smoke (Playwright)
    runs-on: ubuntu-latest
    env:
      # CI flips playwright.config.ts to its CI posture (retries, no reuse).
      CI: "true"
      NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"
      NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e smoke
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore
